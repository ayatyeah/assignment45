groups:
  - name: assignment_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Target {{ $labels.instance }} is unreachable."
      - alert: HighCpuUsage
        expr: sum(rate(process_cpu_seconds_total[1m])) by (instance) > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "High CPU usage on {{ $labels.instance }}."
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) / sum(rate(http_requests_total[1m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate"
          description: "5xx error rate is above 5% on {{ $labels.instance }}."