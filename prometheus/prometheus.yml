global:
  scrape_interval: 5s

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'services'
    metrics_path: '/metrics'
    static_configs:
      - targets: 
        - 'product_service:8000'
        - 'order_service:8000'
        - 'auth_service:8000'
        - 'user_service:8000'
        - 'chat_service:8000'