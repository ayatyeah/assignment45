version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: microservices_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: always

  api_gateway:
    image: nginx:alpine
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - frontend
      - product_service
      - order_service

  frontend:
    build: ./frontend
    networks:
      - app_network

  auth_service:
    build: ./backend/auth_service
    networks:
      - app_network

  product_service:
    build: ./backend/product_service
    networks:
      - app_network

  order_service:
    build: ./backend/order_service
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/microservices_db
      PRODUCT_SERVICE_URL: http://product_service:8000
    networks:
      - app_network
    depends_on:
      - db

  user_service:
    build: ./backend/user_service
    networks:
      - app_network

  chat_service:
    build: ./backend/chat_service
    networks:
      - app_network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    networks:
      - app_network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      - prometheus

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge